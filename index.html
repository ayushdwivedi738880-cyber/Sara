
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sara Voice Assistant</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <!-- Main Assistant Interface -->
    <div class="assistant-container">
        <!-- Floating Assistant Button -->
        <button id="sara-toggle" class="sara-toggle-btn" aria-label="Toggle Sara Voice Assistant">
            <i class="fas fa-microphone"></i>
            <span class="pulse-ring"></span>
        </button>

        <!-- Assistant Window -->
        <div id="sara-window" class="sara-window" style="display: none;">
            <div class="sara-header">
                <div class="sara-avatar">
                    <div class="avatar-circle">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="sara-status">
                        <span class="status-dot" id="status-dot"></span>
                        <span id="sara-status-text">Ready</span>
                    </div>
                </div>
                <button id="sara-close" class="close-btn">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div class="sara-content">
                <!-- Conversation Area -->
                <div class="conversation-area" id="conversation-area">
                    <div class="message sara-message">
                        <div class="message-content">
                            Hello! I'm Sara, your voice assistant. How can I help you today?
                        </div>
                        <div class="message-time">Just now</div>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="input-area">
                    <div class="input-group">
                        <input type="text" 
                               id="text-input" 
                               placeholder="Type your message or click microphone..."
                               aria-label="Type your message">
                        <button id="voice-toggle" class="voice-toggle">
                            <i class="fas fa-microphone"></i>
                        </button>
                        <button id="send-text" class="send-btn">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                    <div class="voice-feedback" id="voice-feedback" style="display: none;">
                        <div class="voice-visualizer">
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                        </div>
                        <p id="listening-text">Listening...</p>
                    </div>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="quick-actions">
                <button class="quick-btn" data-command="time">
                    <i class="fas fa-clock"></i>
                    <span>Time</span>
                </button>
                <button class="quick-btn" data-command="weather">
                    <i class="fas fa-cloud-sun"></i>
                    <span>Weather</span>
                </button>
                <button class="quick-btn" data-command="news">
                    <i class="fas fa-newspaper"></i>
                    <span>News</span>
                </button>
                <button class="quick-btn" data-command="joke">
                    <i class="fas fa-laugh"></i>
                    <span>Joke</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h2>Sara Settings</h2>
            <div class="settings-group">
                <label>
                    <input type="checkbox" id="auto-start" checked>
                    Auto-start listening
                </label>
                <label>
                    <input type="checkbox" id="sound-effects" checked>
                    Sound effects
                </label>
                <label>
                    <input type="checkbox" id="wake-word" checked>
                    Enable "Hey Sara" wake word
                </label>
            </div>
            <div class="settings-group">
                <label>Voice:
                    <select id="voice-select">
                        <!-- Options will be populated dynamically -->
                    </select>
                </label>
                <label>Speech Rate:
                    <input type="range" id="speech-rate" min="0.5" max="2" step="0.1" value="1">
                    <span id="rate-value">1.0</span>
                </label>
            </div>
            <button id="save-settings" class="btn-primary">Save Settings</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="scripts/sara-core.js" type="module"></script>
    <script src="scripts/voice-recognition.js" type="module"></script>
    <script src="scripts/text-to-speech.js" type="module"></script>
    <script src="scripts/commands.js" type="module"></script>
    <script src="scripts/ui-manager.js" type="module"></script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(reg => console.log('Service Worker registered'))
                .catch(err => console.log('Service Worker registration failed:', err));
        }
    </script>
</body>
              </html>
