<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <title>Miya – AI GM Assistant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      color: #fff;
      font-family: system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .ai-box {
      width: 360px;
      background: #141414;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 0 30px rgba(0,255,255,0.1);
    }

    .avatar {
      text-align: center;
      font-size: 72px;
    }

    .status {
      text-align: center;
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 10px;
    }

    .chat {
      height: 220px;
      overflow-y: auto;
      background: #0f0f0f;
      padding: 10px;
      border-radius: 10px;
      font-size: 14px;
    }

    .msg {
      margin-bottom: 8px;
    }

    .miya {
      color: #7fffd4;
    }

    .you {
      color: #ffd700;
    }

    .controls {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    input {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      padding: 8px 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #00ffd5;
      color: #000;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="ai-box">
  <div class="avatar">🧠</div>
  <div class="status" id="status">Miya ready hai</div>

  <div class="chat" id="chat">
    <div class="msg miya">
      <b>Miya:</b> Namaste. Mai Miya hoon.  
      Game master aur tumhari assistant.  
      Jab chaaho bolo.
    </div>
  </div>

  <div class="controls">
    <input id="input" placeholder="Yahan likho ya mic dabao..." />
    <button onclick="send()">Send</button>
    <button onclick="listen()">🎤</button>
  </div>
</div>

<script>
  const chat = document.getElementById("chat");
  const status = document.getElementById("status");
  const input = document.getElementById("input");

  const synth = window.speechSynthesis;

  function speak(text) {
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = "hi-IN";
    utter.rate = 0.95;
    synth.speak(utter);
  }

  function addMsg(who, text) {
    const div = document.createElement("div");
    div.className = "msg " + (who === "Miya" ? "miya" : "you");
    div.innerHTML = `<b>${who}:</b> ${text}`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function miyaReply(userText) {
    let reply = "Samjha. Aage bolo.";

    if (userText.includes("time")) {
      reply = `Abhi samay hai ${new Date().toLocaleTimeString("hi-IN")}`;
    }
    else if (userText.includes("ready")) {
      reply = "Mai ready hoon. Alert mode active.";
    }
    else if (userText.includes("hello") || userText.includes("namaste")) {
      reply = "Namaste. Kaam batao.";
    }
    else if (userText.includes("kaun ho")) {
      reply = "Mai Miya hoon. Tumhari AI game master aur guide.";
    }

    addMsg("Miya", reply);
    speak(reply);
  }

  function send() {
    const text = input.value.trim();
    if (!text) return;
    addMsg("Tum", text);
    input.value = "";
    miyaReply(text.toLowerCase());
  }

  function listen() {
    if (!("webkitSpeechRecognition" in window)) {
      alert("Voice support nahi hai is browser me.");
      return;
    }

    const rec = new webkitSpeechRecognition();
    rec.lang = "hi-IN";
    rec.onstart = () => status.textContent = "Sun rahi hoon...";
    rec.onend = () => status.textContent = "Miya ready hai";
    rec.onresult = e => {
      const text = e.results[0][0].transcript;
      addMsg("Tum", text);
      miyaReply(text.toLowerCase());
    };
    rec.start();
  }
</script>

</body>
</html>
